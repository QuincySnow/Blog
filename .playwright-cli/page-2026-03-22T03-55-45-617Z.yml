                  - img [ref=e342]
              - code [ref=e346]:
                - generic [ref=e347]: sudo apt purge fcitx4* ibus* -y
                - generic [ref=e348]: sudo apt autoremove -y
            - heading "2) 安装核心组件" [level=3] [ref=e349]
            - generic [ref=e350]:
              - generic [ref=e351]:
                - generic [ref=e352]: PLAINTEXT
                - button "复制" [ref=e353] [cursor=pointer]:
                  - img [ref=e354]
              - code [ref=e358]:
                - generic [ref=e359]: sudo apt update
                - generic [ref=e360]: sudo apt install fcitx5 fcitx5-chinese-addons fcitx5-frontend-gtk3 fcitx5-frontend-qt5 fcitx5-config-qt -y
            - heading "3) 配置环境变量（关键）" [level=3] [ref=e361]
            - generic [ref=e362]:
              - generic [ref=e363]:
                - generic [ref=e364]: PLAINTEXT
                - button "复制" [ref=e365] [cursor=pointer]:
                  - img [ref=e366]
              - code [ref=e370]:
                - generic [ref=e371]: sudo nano /etc/environment
            - paragraph [ref=e372]: 在末尾添加：
            - generic [ref=e373]:
              - generic [ref=e374]:
                - generic [ref=e375]: PLAINTEXT
                - button "复制" [ref=e376] [cursor=pointer]:
                  - img [ref=e377]
              - code [ref=e381]:
                - generic [ref=e382]: GTK_IM_MODULE=fcitx
                - generic [ref=e383]: QT_IM_MODULE=fcitx
                - generic [ref=e384]: XMODIFIERS=@im=fcitx
                - generic [ref=e385]: SDL_IM_MODULE=fcitx
