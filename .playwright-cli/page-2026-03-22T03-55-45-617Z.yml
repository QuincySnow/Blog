                - generic [ref=e213]: sudo nano /etc/systemd/system/rclone-proton.service
            - paragraph [ref=e214]: 写入配置（按你的用户名改路径）：
            - generic [ref=e215]:
              - generic [ref=e216]:
                - generic [ref=e217]: PLAINTEXT
                - button "复制" [ref=e218] [cursor=pointer]:
                  - img [ref=e219]
              - code [ref=e223]:
                - generic [ref=e224]: "[Unit]"
                - generic [ref=e225]: Description=Rclone Mount ProtonDrive (Auto-restart)
                - generic [ref=e226]: After=network-online.target
                - generic [ref=e227]: Wants=network-online.target
                - generic [ref=e228]: "[Service]"
                - generic [ref=e229]: Type=simple
                - generic [ref=e230]: User=ub
                - generic [ref=e231]: Group=ub
                - generic [ref=e232]: "ExecStart=/usr/bin/rclone mount n: /home/ub/ProtonDrive \\"
                - generic [ref=e233]: "--vfs-cache-mode full \\"
                - generic [ref=e234]: "--dir-cache-time 24h \\"
                - generic [ref=e235]: "--vfs-cache-max-size 10G \\"
                - generic [ref=e236]: "--vfs-cache-max-age 1h \\"
                - generic [ref=e237]: "--log-level INFO \\"
                - generic [ref=e238]: "--log-file /home/ub/rclone-proton.log"
                - generic [ref=e239]: Restart=always
                - generic [ref=e240]: RestartSec=10
                - generic [ref=e241]: ExecStop=/usr/bin/fusermount3 -u /home/ub/ProtonDrive
                - generic [ref=e242]: "[Install]"
                - generic [ref=e243]: WantedBy=default.target
            - paragraph [ref=e244]: 启用服务：
