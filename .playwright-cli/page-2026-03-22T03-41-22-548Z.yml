            - paragraph [ref=e320]: 相比 Fcitx4 与 IBus，Fcitx5 在性能、UI 和 Wayland 支持上更现代。
            - heading "1) 清理旧环境" [level=3] [ref=e321]
            - generic [ref=e322]:
              - generic [ref=e323]:
