              - code [ref=e204]:
                - generic [ref=e205]: sudo nano /etc/systemd/system/rclone-proton.service
            - paragraph [ref=e206]: 写入配置（按你的用户名改路径）：
            - generic [ref=e207]:
              - generic [ref=e208]:
                - text: PLAINTEXT
                - button "复制" [ref=e209]:
                  - text: ⎘
                  - img [ref=e210]
              - code [ref=e214]:
                - generic [ref=e215]: "[Unit]"
                - generic [ref=e216]: Description=Rclone Mount ProtonDrive (Auto-restart)
                - generic [ref=e217]: After=network-online.target
                - generic [ref=e218]: Wants=network-online.target
                - generic [ref=e219]: "[Service]"
                - generic [ref=e220]: Type=simple
                - generic [ref=e221]: User=ub
                - generic [ref=e222]: Group=ub
                - generic [ref=e223]: "ExecStart=/usr/bin/rclone mount n: /home/ub/ProtonDrive \\"
                - generic [ref=e224]: "--vfs-cache-mode full \\"
                - generic [ref=e225]: "--dir-cache-time 24h \\"
                - generic [ref=e226]: "--vfs-cache-max-size 10G \\"
                - generic [ref=e227]: "--vfs-cache-max-age 1h \\"
                - generic [ref=e228]: "--log-level INFO \\"
                - generic [ref=e229]: "--log-file /home/ub/rclone-proton.log"
                - generic [ref=e230]: Restart=always
                - generic [ref=e231]: RestartSec=10
                - generic [ref=e232]: ExecStop=/usr/bin/fusermount3 -u /home/ub/ProtonDrive
                - generic [ref=e233]: "[Install]"
                - generic [ref=e234]: WantedBy=default.target
            - paragraph [ref=e235]: 启用服务：
            - generic [ref=e236]:
              - generic [ref=e237]:
                - text: PLAINTEXT
                - button "复制" [ref=e238]:
                  - text: ⎘
                  - img [ref=e239]
              - code [ref=e243]:
                - generic [ref=e244]: sudo systemctl daemon-reload
                - generic [ref=e245]: sudo systemctl enable rclone-proton.service
                - generic [ref=e246]: sudo systemctl start rclone-proton.service
            - paragraph [ref=e247]: 常用命令：
