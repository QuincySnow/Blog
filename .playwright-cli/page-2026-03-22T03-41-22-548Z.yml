                  - text: ⎘
                  - img [ref=e325]
              - code [ref=e329]:
                - generic [ref=e330]: sudo apt purge fcitx4* ibus* -y
                - generic [ref=e331]: sudo apt autoremove -y
            - heading "2) 安装核心组件" [level=3] [ref=e332]
            - generic [ref=e333]:
              - generic [ref=e334]:
                - text: PLAINTEXT
                - button "复制" [ref=e335]:
                  - text: ⎘
                  - img [ref=e336]
              - code [ref=e340]:
                - generic [ref=e341]: sudo apt update
                - generic [ref=e342]: sudo apt install fcitx5 fcitx5-chinese-addons fcitx5-frontend-gtk3 fcitx5-frontend-qt5 fcitx5-config-qt -y
            - heading "3) 配置环境变量（关键）" [level=3] [ref=e343]
            - generic [ref=e344]:
              - generic [ref=e345]:
                - text: PLAINTEXT
                - button "复制" [ref=e346]:
                  - text: ⎘
                  - img [ref=e347]
              - code [ref=e351]:
                - generic [ref=e352]: sudo nano /etc/environment
            - paragraph [ref=e353]: 在末尾添加：
            - generic [ref=e354]:
              - generic [ref=e355]:
                - text: PLAINTEXT
                - button "复制" [ref=e356]:
                  - text: ⎘
                  - img [ref=e357]
              - code [ref=e361]:
                - generic [ref=e362]: GTK_IM_MODULE=fcitx
                - generic [ref=e363]: QT_IM_MODULE=fcitx
                - generic [ref=e364]: XMODIFIERS=@im=fcitx
                - generic [ref=e365]: SDL_IM_MODULE=fcitx
