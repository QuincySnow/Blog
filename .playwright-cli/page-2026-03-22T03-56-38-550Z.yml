            - separator [ref=e51]
          - generic [ref=e52]:
            - paragraph [ref=e53]: 记录一批在 macOS（含黑苹果）上自己觉得好用的软件，按用途分类，随用随补。
            - separator [ref=e54]
            - heading "浏览器：Floorp" [level=2] [ref=e55]
            - paragraph [ref=e56]:
              - strong [ref=e57]: Floorp
              - text: 是一款基于
              - strong [ref=e58]: Firefox
              - text: 的
              - strong [ref=e59]: 免费开源
              - text: 桌面浏览器，使用与 Firefox 相同的
              - strong [ref=e60]: Gecko
              - text: 引擎。
            - list [ref=e61]:
              - listitem [ref=e62]:
                - strong [ref=e63]: Gecko
                - text: ：Mozilla 开发的网页渲染与 JavaScript 引擎，Firefox、Waterfox、Floorp 等均基于它；与 Chrome/Edge 使用的 Chromium（Blink 引擎）不同，扩展生态为 Firefox 系（AMO），不兼容 Chrome 扩展。
              - listitem [ref=e64]:
                - strong [ref=e65]: Gecko 中的 Rust
                - text: ：近年来 Gecko 大量引入
                - strong [ref=e66]: Rust
                - text: 编写的模块，在保持兼容的前提下提升性能与安全性。典型包括：
                - strong [ref=e67]: WebRender
                - text: （Rust 实现的 GPU 加速渲染，多核并行绘制）、
                - strong [ref=e68]: Stylo
                - text: （Rust 实现的 CSS 样式计算引擎，并行解析与计算）。二者与多进程架构结合，使 Firefox 系在多核与高分辨率下的渲染与样式性能明显改善，Floorp 作为同一引擎的衍生版同样受益。
              - listitem [ref=e69]:
                - strong [ref=e70]: 定位
                - text: ：在保留 Firefox 隐私与可定制能力的前提下，增加工作区、侧栏、垂直标签等界面与工作流增强，适合作为主力日常浏览器。
            - paragraph [ref=e71]:
              - link "Floorp" [ref=e72] [cursor=pointer]:
                - /url: https://floorp.app/
                - strong [ref=e73]: Floorp
              - text: 官网：
              - link "floorp.app" [ref=e74] [cursor=pointer]:
                - /url: https://floorp.app/
              - text: （MPL 2.0）：
            - list [ref=e75]:
              - listitem [ref=e76]:
                - strong [ref=e77]: 界面
                - text: ：侧栏、垂直/多行标签、工作区、Web 面板等可大幅自定义
              - listitem [ref=e78]:
                - strong [ref=e79]: 隐私与追踪
                - text: ：内置追踪保护（标准 / 严格 / 自定义），支持
                - code [ref=e80]: about:config
                - text: 细调
              - listitem [ref=e81]:
                - strong [ref=e82]: 扩展
                - text: ：兼容 Firefox 附加组件（AMO）；支持 Floorp View 跨设备同步标签（Mozilla 账户）
              - listitem [ref=e83]:
                - strong [ref=e84]: 平台
                - text: ：支持 macOS 10.15+、Apple Silicon 与 Intel
            - paragraph [ref=e85]:
              - text: 适合替代 Chrome、Safari 作为主力浏览器。官网下载：
              - link "floorp.app" [ref=e86] [cursor=pointer]:
                - /url: https://floorp.app/
              - text: ，或
              - code [ref=e87]: brew install --cask floorp
              - text: ；源码
              - link "GitHub" [ref=e88] [cursor=pointer]:
                - /url: https://github.com/Floorp-Projects/Floorp
              - text: 。具体的介绍参考
              - link "Floorp 性能与隐私配置" [ref=e89] [cursor=pointer]:
                - /url: ../Floorp/
            - separator [ref=e90]
            - heading "系统维护：OnyX" [level=2] [ref=e91]
            - paragraph [ref=e92]:
              - link "OnyX" [ref=e93] [cursor=pointer]:
                - /url: https://www.titanium-software.fr/en/onyx.html
                - strong [ref=e94]: OnyX
              - text: 是 Titanium Software 出的
              - strong [ref=e95]: 系统多功能维护工具
              - text: ，可用来：
            - list [ref=e96]:
              - listitem [ref=e97]: 检查系统文件结构
              - listitem [ref=e98]: 执行清理与日常维护（清理缓存、删除问题文件、重建数据库与索引等）
              - listitem [ref=e99]: 配置 Finder、Dock、Safari 及部分系统应用参数
              - listitem [ref=e100]: 卸载应用
            - paragraph [ref=e101]: 很多原本需要命令行完成的操作，用 OnyX 的图形界面即可完成，适合不想记命令的用户。
            - paragraph [ref=e102]:
              - strong [ref=e103]: 注意
              - text: ：
              - strong [ref=e104]: 每个大版本 macOS 对应一个 OnyX 版本
              - text: ，必须下载与当前系统匹配的版本（例如 macOS Sequoia 15 用 OnyX 4.8.x，Tahoe 26 用 4.9.x）。官网提供从老版本到最新版的下载，见
              - link "OnyX 官网" [ref=e105] [cursor=pointer]:
                - /url: https://www.titanium-software.fr/en/onyx.html
              - text: 。
            - separator [ref=e106]
            - heading "卸载 / 清理：AppCleaner" [level=2] [ref=e107]
            - paragraph [ref=e108]:
              - link "AppCleaner" [ref=e109] [cursor=pointer]:
                - /url: https://freemacsoft.net/appcleaner/
                - strong [ref=e110]: AppCleaner
              - text: （FreeMacSoft）是
              - strong [ref=e111]: 免费
              - text: 的卸载工具，用于
              - strong [ref=e112]: 彻底移除
              - text: Mac 上的应用及其残留文件：
            - list [ref=e113]:
              - listitem [ref=e114]:
                - strong [ref=e115]: 拖拽卸载
                - text: ：把应用拖进窗口即可扫描并列出相关文件（偏好、缓存、Library 等）
              - listitem [ref=e116]:
                - strong [ref=e117]: 可选删除
                - text: ：用勾选框选择要删的内容，可保留部分文件（如备份）
              - listitem [ref=e118]:
                - strong [ref=e119]: SmartDelete
                - text: ：应用已进废纸篓时，可检测并清理残留项
              - listitem [ref=e120]:
                - strong [ref=e121]: 应用列表
                - text: ：浏览已安装应用、小组件、插件，方便批量清理
            - paragraph [ref=e122]:
              - text: 删除前会先移入废纸篓，误删可恢复。支持 Apple Silicon 与 Intel，兼容多代 macOS。官网下载：
              - link "freemacsoft.net/appcleaner" [ref=e123] [cursor=pointer]:
                - /url: https://freemacsoft.net/appcleaner/
              - text: ，或
              - code [ref=e124]: brew install --cask appcleaner
              - text: 。
            - separator [ref=e125]
            - heading "录屏 / GIF：Kap" [level=2] [ref=e126]
            - paragraph [ref=e127]:
              - link "Kap" [ref=e128] [cursor=pointer]:
                - /url: https://getkap.co/
                - strong [ref=e129]: Kap
              - text: 是一款
              - strong [ref=e130]: 免费开源
              - text: 的 macOS 录屏工具，特点包括：
            - list [ref=e131]:
              - listitem [ref=e132]:
                - strong [ref=e133]: 多格式导出
                - text: ：GIF、MP4、WebM、APNG，可选带音频
              - listitem [ref=e134]:
                - strong [ref=e135]: 录制范围
                - text: ：全屏、指定窗口或自选区域
              - listitem [ref=e136]:
                - strong [ref=e137]: 简单编辑
                - text: ：裁剪、点击高亮等
              - listitem [ref=e138]:
                - strong [ref=e139]: 插件扩展
                - text: ：可对接 Giphy、Streamable 等
              - listitem [ref=e140]:
                - text: 支持
                - strong [ref=e141]: Apple Silicon 与 Intel
                - text: ，需 macOS 12+
            - paragraph [ref=e142]:
              - text: 适合做教程动图、演示片段。官网下载：
              - link "getkap.co" [ref=e143] [cursor=pointer]:
                - /url: https://getkap.co/
              - text: ，源码见
              - link "GitHub" [ref=e144] [cursor=pointer]:
                - /url: https://github.com/wulkano/kap
              - text: 。
            - separator [ref=e145]
            - heading "下载器：Motrix" [level=2] [ref=e146]
            - paragraph [ref=e147]:
              - link "Motrix" [ref=e148] [cursor=pointer]:
                - /url: https://motrix.app/download
                - strong [ref=e149]: Motrix
              - text: 是一款
              - strong [ref=e150]: 免费开源
              - text: 的跨平台下载管理工具，macOS 上可替代迅雷等：
            - list [ref=e151]:
              - listitem [ref=e152]:
                - strong [ref=e153]: 协议支持
                - text: ：HTTP/HTTPS、FTP、BT、Magnet 磁力，BT 支持选择性下载
              - listitem [ref=e154]:
                - strong [ref=e155]: 多任务
                - text: ：最多 10 个并发任务，单任务最多 64 线程
              - listitem [ref=e156]:
                - strong [ref=e157]: 限速、端口映射
                - text: ：支持限速与 UPnP/NAT-PMP
              - listitem [ref=e158]:
                - strong [ref=e159]: 界面
                - text: ：简洁、支持深色模式，支持 Touch Bar、菜单栏实时速度
              - listitem [ref=e160]:
                - strong [ref=e161]: BT 追踪器
                - text: ：可自动更新每日 tracker 列表
            - paragraph [ref=e162]:
              - text: 官网下载：
              - link "motrix.app" [ref=e163] [cursor=pointer]:
                - /url: https://motrix.app/download
              - text: ，也可
              - code [ref=e164]: brew install --cask motrix
              - text: ；源码
              - link "GitHub" [ref=e165] [cursor=pointer]:
                - /url: https://github.com/agalwood/Motrix
              - text: （MIT）。
            - separator [ref=e166]
            - heading "视频 / 音频播放器：IINA" [level=2] [ref=e167]
            - paragraph [ref=e168]:
              - link "IINA" [ref=e169] [cursor=pointer]:
                - /url: https://iina.io/
                - strong [ref=e170]: IINA
              - text: 是面向 macOS 的
              - strong [ref=e171]: 现代本地播放器
              - text: ，基于 mpv，免费开源（GPLv3）：
            - list [ref=e172]:
              - listitem [ref=e173]:
                - strong [ref=e174]: 格式支持
                - text: ：常见视频、音频格式，本地文件与网络流；配合浏览器扩展可播 YouTube 等在线源
              - listitem [ref=e175]:
                - strong [ref=e176]: 系统融合
                - text: ：原生支持深色模式、画中画、Touch Bar、系统媒体键、在线字幕、音乐模式、手势与缩略图预览
              - listitem [ref=e177]:
                - strong [ref=e178]: 可定制
                - text: ：界面与快捷键可调；1.4 起支持插件（beta）
            - paragraph [ref=e179]:
              - text: 适合做系统默认播放器，替代 VLC / QuickTime。官网下载：
              - link "iina.io" [ref=e180] [cursor=pointer]:
                - /url: https://iina.io/download/
              - text: ，也可
              - code [ref=e181]: brew install --cask iina
              - text: ；源码
              - link "GitHub" [ref=e182] [cursor=pointer]:
                - /url: https://github.com/iina/iina
              - text: 。
            - separator [ref=e183]
            - heading "剪贴板管理：Maccy" [level=2] [ref=e184]
            - paragraph [ref=e185]:
              - link "Maccy" [ref=e186] [cursor=pointer]:
                - /url: https://maccy.app/
                - strong [ref=e187]: Maccy
              - text: 是
              - strong [ref=e188]: 轻量开源
              - text: 的剪贴板历史工具（MIT）：
            - list [ref=e189]:
              - listitem [ref=e190]:
                - strong [ref=e191]: 快捷键
                - text: ：
                - strong [ref=e192]: Shift+Command+C
                - text: 呼出，输入搜索、Enter 复制选中项，Option+Enter 直接粘贴
              - listitem [ref=e193]:
                - strong [ref=e194]: 本地与隐私
                - text: ：历史仅存本机，可排除密码管理器等敏感内容
              - listitem [ref=e195]:
                - strong [ref=e196]: 界面
                - text: ：极简、类系统原生，支持置顶常用项、清空历史
            - paragraph [ref=e197]:
              - text: 官网
              - link "maccy.app" [ref=e198] [cursor=pointer]:
                - /url: https://maccy.app/
              - text: ，或
              - code [ref=e199]: brew install --cask maccy
              - text: ；源码
              - link "GitHub" [ref=e200] [cursor=pointer]:
                - /url: https://github.com/p0deje/Maccy
              - text: 。需 macOS 14+（Sonoma 及更新）。
            - separator [ref=e201]
            - heading "密码管理器：KeePassXC" [level=2] [ref=e202]
            - paragraph [ref=e203]:
              - link "KeePassXC" [ref=e204] [cursor=pointer]:
                - /url: https://keepassxc.org/
                - strong [ref=e205]: KeePassXC
              - text: 是
              - strong [ref=e206]: 免费开源
              - text: 的本地密码管理器（GPLv3），支持 macOS / Windows / Linux：
            - list [ref=e207]:
              - listitem [ref=e208]:
                - strong [ref=e209]: 本地与隐私
                - text: ：密码库为本地加密文件（.kdbx），完全由你掌控，无云同步、无第三方服务器
              - listitem [ref=e210]:
                - strong [ref=e211]: 功能
                - text: ：保存密码、用户名、URL、附件、备注；内置
                - strong [ref=e212]: 强密码 / 口令生成器
                - text: ；支持浏览器扩展自动填充
              - listitem [ref=e213]:
                - strong [ref=e214]: 跨平台
                - text: ：同一数据库可在多系统打开，适合自建同步（如 iCloud / 网盘放 .kdbx）
            - paragraph [ref=e215]:
              - text: 官网下载：
              - link "keepassxc.org" [ref=e216] [cursor=pointer]:
                - /url: https://keepassxc.org/download/
              - text: （区分 Apple Silicon / Intel），或
              - code [ref=e217]: brew install --cask keepassxc
              - text: ；文档与源码见
              - link "KeePassXC 官网" [ref=e218] [cursor=pointer]:
                - /url: https://keepassxc.org/
              - text: 。
            - separator [ref=e219]
            - heading "后续可补充" [level=2] [ref=e220]
            - paragraph [ref=e221]: 后续会按使用情况继续往本文补充，例如：剪贴板管理、窗口管理、终端/开发相关等。若你有特别想看到的类别，可以留言。
